<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ниа — AI-ассистент</title>
<meta name="description" content="Ниа — умный AI-ассистент. Отвечает на любые вопросы, анализирует изображения и рисует картинки."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Geist:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ── Tokens ── */
:root {
  --bg:       #0c0c0e;
  --bg2:      #141416;
  --bg3:      #1c1c1f;
  --line:     rgba(255,255,255,0.07);
  --line2:    rgba(255,255,255,0.12);
  --tx:       #f0eff4;
  --tx2:      #7e7d8a;
  --tx3:      #3e3d4a;
  --accent:   #c8b8ff;
  --accent2:  #8b6fff;
  --warn:     #ff7b7b;
  --r:        14px;
  --r2:       20px;
}
[data-theme="light"] {
  --bg:       #f8f8fa;
  --bg2:      #ffffff;
  --bg3:      #f0eff5;
  --line:     rgba(0,0,0,0.07);
  --line2:    rgba(0,0,0,0.13);
  --tx:       #18171f;
  --tx2:      #6e6d7a;
  --tx3:      #c5c4d0;
  --accent:   #6b4fff;
  --accent2:  #4930cc;
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; }
body {
  font-family: 'Geist', sans-serif;
  background: var(--bg);
  color: var(--tx);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: background .25s, color .25s;
}

/* ── Header ── */
header {
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
  gap: 0;
}
.brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 300;
  letter-spacing: .06em;
  color: var(--tx);
  flex: 1;
}
.brand em {
  font-style: italic;
  color: var(--accent);
}
.hbtns {
  display: flex;
  align-items: center;
  gap: 4px;
}
.hbtn {
  background: transparent;
  border: none;
  color: var(--tx2);
  cursor: pointer;
  width: 34px;
  height: 34px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s, color .15s;
  flex-shrink: 0;
}
.hbtn:hover { background: var(--bg3); color: var(--tx); }
.hbtn svg { width: 17px; height: 17px; }

/* ── Messages ── */
#msgs {
  flex: 1;
  overflow-y: auto;
  padding: 32px 0 12px;
  display: flex;
  flex-direction: column;
  gap: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--bg3) transparent;
}
#msgs::-webkit-scrollbar { width: 3px; }
#msgs::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

/* ── Empty state ── */
#empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  min-height: 60%;
  padding: 24px;
  text-align: center;
  animation: fadeIn .4s ease both;
}
.empty-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 48px;
  font-weight: 300;
  font-style: italic;
  color: var(--tx);
  line-height: 1;
  margin-bottom: 8px;
  letter-spacing: -.01em;
}
.empty-sub {
  font-size: 14px;
  color: var(--tx2);
  font-weight: 300;
  margin-bottom: 36px;
  letter-spacing: .02em;
}
.starters {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
  max-width: 400px;
}
.starter {
  background: var(--bg2);
  border: 1px solid var(--line2);
  border-radius: var(--r);
  padding: 11px 16px;
  text-align: left;
  cursor: pointer;
  font-size: 13.5px;
  color: var(--tx2);
  font-family: 'Geist', sans-serif;
  font-weight: 300;
  transition: all .18s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.starter:hover { background: var(--bg3); border-color: var(--accent); color: var(--tx); }
.starter-icon { font-size: 15px; flex-shrink: 0; }

/* ── Message rows ── */
.mrow {
  padding: 14px 20px;
  max-width: 720px;
  width: 100%;
  margin: 0 auto;
  animation: fadeIn .2s ease both;
}
@keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }

.mrow.user-row {
  display: flex;
  justify-content: flex-end;
}
.mrow.ai-row {
  border-bottom: 1px solid var(--line);
}
.mrow.ai-row:last-child { border-bottom: none; }

/* User bubble */
.user-bubble {
  background: var(--bg3);
  border: 1px solid var(--line2);
  border-radius: var(--r2) var(--r2) 4px var(--r2);
  padding: 11px 15px;
  max-width: 80%;
  font-size: 15px;
  line-height: 1.65;
  font-weight: 300;
  color: var(--tx);
}
.user-bubble img {
  max-width: 100%;
  max-height: 260px;
  border-radius: 10px;
  display: block;
  margin-bottom: 6px;
}

/* AI response — no bubble, just text with label */
.ai-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 12px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--accent);
  font-style: italic;
  margin-bottom: 8px;
  font-weight: 300;
}
.ai-text {
  font-size: 15px;
  line-height: 1.75;
  color: var(--tx);
  font-weight: 300;
  white-space: pre-wrap;
  word-break: break-word;
}
.ai-text.err { color: var(--warn); }

/* Generated image */
.gen-img {
  margin-top: 14px;
  border-radius: var(--r);
  overflow: hidden;
  border: 1px solid var(--line2);
  display: inline-block;
}
.gen-img img {
  display: block;
  max-width: 100%;
  max-height: 380px;
}
.gen-img-cap {
  font-size: 11px;
  color: var(--tx3);
  padding: 7px 12px;
  background: var(--bg2);
  border-top: 1px solid var(--line);
  letter-spacing: .03em;
}

/* Typing dots */
.typing {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 0 2px;
}
.td { width:5px; height:5px; border-radius:50%; background:var(--tx3); animation:tdot 1.1s ease-in-out infinite; }
.td:nth-child(2){animation-delay:.15s}
.td:nth-child(3){animation-delay:.3s}
@keyframes tdot { 0%,80%,100%{transform:translateY(0);opacity:.3} 40%{transform:translateY(-5px);opacity:1;background:var(--accent)} }

/* ── Input ── */
.input-shell {
  padding: 12px 20px 16px;
  border-top: 1px solid var(--line);
  flex-shrink: 0;
}
.ibox {
  max-width: 720px;
  margin: 0 auto;
  background: var(--bg2);
  border: 1px solid var(--line2);
  border-radius: var(--r2);
  overflow: hidden;
  transition: border-color .2s, box-shadow .2s;
}
.ibox:focus-within {
  border-color: rgba(139,111,255,.4);
  box-shadow: 0 0 0 3px rgba(139,111,255,.07);
}

/* image preview */
#preview {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 10px 14px 0;
}
#preview.on { display: flex; }
#preview img { height: 52px; border-radius: 8px; border:1px solid var(--line2); }
.rm-prev {
  background: var(--bg3); border:none; color:var(--tx2);
  width:18px; height:18px; border-radius:50%; cursor:pointer; font-size:11px;
  display:flex; align-items:center; justify-content:center;
  margin-left:-10px; margin-top:-18px; align-self:flex-start; flex-shrink:0;
}

.irow {
  display: flex;
  align-items: flex-end;
  padding: 10px 12px 10px;
  gap: 6px;
}
#fi { display:none; }
.icobtn {
  background:transparent; border:none; color:var(--tx2); cursor:pointer;
  width:32px; height:32px; border-radius:8px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; transition:all .15s;
}
.icobtn:hover { background:var(--bg3); color:var(--tx); }
.icobtn svg { width:17px; height:17px; }
#msginp {
  flex:1; background:transparent; border:none; outline:none; resize:none;
  color:var(--tx); font-family:'Geist', sans-serif; font-size:15px;
  font-weight:300; line-height:1.5; max-height:130px; min-height:24px; padding:4px 0;
}
#msginp::placeholder { color:var(--tx3); }
#sendbtn {
  width:32px; height:32px; border-radius:8px; border:none; cursor:pointer;
  background:var(--accent2); color:#fff; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; transition:all .15s;
}
#sendbtn:hover { opacity:.82; transform:scale(1.06); }
#sendbtn:disabled { background:var(--bg3); cursor:not-allowed; opacity:.5; }
#sendbtn svg { width:14px; height:14px; }

.fnote {
  text-align:center; font-size:11px; color:var(--tx3);
  margin-top:8px; max-width:720px; margin-left:auto; margin-right:auto;
  letter-spacing:.01em;
}

@media(max-width:580px){
  .empty-name{font-size:38px}
  .mrow{padding:12px 14px}
  .user-bubble{max-width:92%}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="brand"><em>Ниа</em></div>
  <div class="hbtns">
    <!-- New chat -->
    <button class="hbtn" onclick="newChat()" title="Новый чат">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14M5 12h14"/>
      </svg>
    </button>
    <!-- Theme toggle -->
    <button class="hbtn" id="themebtn" onclick="toggleTheme()" title="Сменить тему">
      <svg id="moonico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>
      <svg id="sunico" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>
  </div>
</header>

<!-- MESSAGES -->
<div id="msgs">
  <div id="empty">
    <div class="empty-name">Ниа</div>
    <div class="empty-sub">AI-ассистент · спроси что угодно</div>
    <div class="starters">
      <div class="starter" onclick="use('Нарисуй закат над горами в минималистичном стиле')">
        <span class="starter-icon">🎨</span>Нарисовать картинку
      </div>
      <div class="starter" onclick="use('Напиши короткое стихотворение о рассвете')">
        <span class="starter-icon">✍️</span>Написать текст
      </div>
      <div class="starter" onclick="use('Придумай 5 идей для онлайн-бизнеса без вложений')">
        <span class="starter-icon">💡</span>Идеи для бизнеса
      </div>
      <div class="starter" onclick="use('Объясни квантовые вычисления простым языком')">
        <span class="starter-icon">🔬</span>Объяснить тему
      </div>
    </div>
  </div>
</div>

<!-- INPUT -->
<div class="input-shell">
  <div class="ibox">
    <div id="preview">
      <img id="prevthumb" src="" alt=""/>
      <button class="rm-prev" onclick="removeImg()">×</button>
    </div>
    <div class="irow">
      <label for="fi" class="icobtn" title="Прикрепить изображение">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
      </label>
      <input type="file" id="fi" accept="image/*"/>
      <textarea id="msginp" rows="1" placeholder="Напиши сообщение…"></textarea>
      <button id="sendbtn" onclick="send()" title="Отправить">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="fnote">Ниа может ошибаться — проверяйте важную информацию.</div>
</div>

<script>
// ═══ НАСТРОЙКИ ═══
const NAME = "Ниа";
const SYSTEM = `Ты ${NAME} — умный, дружелюбный AI-ассистент.
Отвечай на любые вопросы, пиши тексты, анализируй изображения, помогай с кодом и бизнесом.
Ты НЕ Claude, не ChatGPT, не Gemini, не Llama — ты ${NAME}.
Если спросят кто создал тебя — скажи что ты ${NAME}, персональный AI-ассистент.
Отвечай на языке пользователя. Пиши живо и по делу.`;
// ═════════════════

const msgsEl  = document.getElementById('msgs');
const inp     = document.getElementById('msginp');
const sbtn    = document.getElementById('sendbtn');
const fi      = document.getElementById('fi');
const preview = document.getElementById('preview');
const pthumb  = document.getElementById('prevthumb');
const empty   = document.getElementById('empty');

let history  = [];   // {role, content}
let pendImg  = null; // base64 data URL

// ── auto-grow textarea
inp.addEventListener('input', () => {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 130) + 'px';
});
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// ── image attach
fi.addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => { pendImg = ev.target.result; pthumb.src = pendImg; preview.classList.add('on'); };
  r.readAsDataURL(f);
});
function removeImg() { pendImg = null; pthumb.src = ''; preview.classList.remove('on'); fi.value = ''; }

// ── starter chips
function use(t) { inp.value = t; inp.dispatchEvent(new Event('input')); inp.focus(); }

// ── theme toggle
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.dataset.theme === 'dark';
  html.dataset.theme = isDark ? 'light' : 'dark';
  document.getElementById('moonico').style.display = isDark ? 'none' : '';
  document.getElementById('sunico').style.display = isDark ? '' : 'none';
}

// ── new chat
function newChat() {
  history = [];
  msgsEl.innerHTML = '';
  msgsEl.appendChild(empty);
  empty.style.display = 'flex';
  inp.value = ''; inp.style.height = 'auto';
  removeImg();
}

// ── detect image generation intent
function wantsImage(t) {
  return /нарисуй|нарисуйте|создай картинку|создай изображение|сгенерируй|изобрази|draw |paint |generate image|create image/i.test(t);
}

// ── SEND
async function send() {
  const txt = inp.value.trim();
  if (!txt && !pendImg) return;
  if (sbtn.disabled) return;

  empty.style.display = 'none';

  // build content
  let content;
  if (pendImg) {
    content = [];
    const b64  = pendImg.split(',')[1];
    const mime = pendImg.split(';')[0].split(':')[1];
    content.push({ type: 'image_url', image_url: { url: `data:${mime};base64,${b64}` } });
    if (txt) content.push({ type: 'text', text: txt });
  } else {
    content = txt;
  }

  addUserRow(txt, pendImg);
  inp.value = ''; inp.style.height = 'auto';
  const capImg = pendImg; removeImg();
  sbtn.disabled = true;

  history.push({ role: 'user', content });

  const typRow = addTyping();
  const needImg = wantsImage(txt) && !capImg;

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, system: SYSTEM })
    });

    const data = await resp.json();
    typRow.remove();

    if (!resp.ok || data.error) {
      addAiRow(data.error || `Ошибка ${resp.status}. Попробуй снова.`, true);
    } else {
      const reply = data.text || 'Не удалось получить ответ.';
      history.push({ role: 'assistant', content: reply });
      const aiRow = addAiRow(reply);

      if (needImg) {
        const t2 = addTypingInRow(aiRow);
        try {
          const ir = await fetch('/api/generate-image', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: txt })
          });
          t2.remove();
          if (ir.ok) { const id = await ir.json(); appendGenImg(aiRow, id.url, txt); }
        } catch (_) { t2.remove(); }
      }
    }
  } catch (err) {
    typRow.remove();
    addAiRow('Сервер временно недоступен. Проверь интернет и попробуй снова.', true);
  }

  sbtn.disabled = false;
  inp.focus();
}

function addUserRow(txt, img) {
  const row = el('div', 'mrow user-row');
  const bub = el('div', 'user-bubble');
  if (img) { const i = el('img'); i.src = img; bub.appendChild(i); }
  if (txt) { const s = el('span'); s.textContent = txt; bub.appendChild(s); }
  row.appendChild(bub);
  msgsEl.appendChild(row); scroll(); return row;
}
function addAiRow(txt, isErr) {
  const row = el('div', 'mrow ai-row');
  const lbl = el('div', 'ai-label'); lbl.textContent = NAME;
  const body = el('div', 'ai-text' + (isErr ? ' err' : '')); body.textContent = txt;
  row.appendChild(lbl); row.appendChild(body);
  msgsEl.appendChild(row); scroll(); return row;
}
function addTyping() {
  const row = el('div', 'mrow ai-row');
  const lbl = el('div', 'ai-label'); lbl.textContent = NAME;
  const dots = el('div', 'typing');
  dots.innerHTML = '<div class="td"></div><div class="td"></div><div class="td"></div>';
  row.appendChild(lbl); row.appendChild(dots);
  msgsEl.appendChild(row); scroll(); return row;
}
function addTypingInRow(row) {
  const dots = el('div', 'typing');
  dots.innerHTML = '<div class="td"></div><div class="td"></div><div class="td"></div>';
  row.appendChild(dots); scroll(); return dots;
}
function appendGenImg(row, url, prompt) {
  const wrap = el('div', 'gen-img');
  const img  = el('img'); img.src = url; img.alt = prompt; img.onload = scroll;
  const cap  = el('div', 'gen-img-cap'); cap.textContent = '↑ Сгенерировано по запросу';
  wrap.appendChild(img); wrap.appendChild(cap); row.appendChild(wrap); scroll();
}
function el(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }
function scroll() { msgsEl.scrollTo({ top: msgsEl.scrollHeight, behavior: 'smooth' }); }
</script>
</body>
</html>
